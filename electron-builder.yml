appId: gg.parsepal.uploader
productName: ParsePal Uploader
copyright: Copyright 2026 ParsePal

directories:
  output: release

files:
  - dist/**/*
  - assets/**/*
  - package.json

extraMetadata:
  main: dist/main/main.js

# ── Code signing ──────────────────────────────────────────────────────
# Set these env vars when you have your Certum cert:
#   CSC_LINK=path/to/cert.pfx (or base64-encoded)
#   CSC_KEY_PASSWORD=your-password
# electron-builder picks them up automatically — no config changes needed.

win:
  icon: assets/icon.ico
  target:
    - target: msi
      arch: [x64]
  # Sign if CSC_LINK env var is present, skip gracefully if not
  signAndEditExecutable: true
  signtoolOptions:
    publisherName: ParsePal

msi:
  oneClick: false
  perMachine: false
  artifactName: ParsePal-Setup-${version}.${ext}
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: ParsePal Uploader

# ── Auto-update (GitHub Releases) ────────────────────────────────────
publish:
  provider: github
  owner: xbkaup2-netizen
  repo: Parsepal
  releaseType: release

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.png
  category: public.app-category.utilities

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: assets/icon.png
  category: Utility
